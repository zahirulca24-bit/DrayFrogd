name: P0-3 Residual Journal Truth Controller

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened

permissions:
  contents: write

jobs:
  patch-verify-commit:
    if: github.head_ref == 'fix/p0-3-residual-journal-truth'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/p0-3-residual-journal-truth
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - run: python scripts/apply_p0_3_residual_truth.py
      - run: python -m compileall -q app tests
      - run: python -m unittest tests.test_exchange_journal_backfill -v
      - run: python -m unittest discover -s tests -p "test_*.py" -v
      - working-directory: frontend
        run: npm ci && npm run lint && npm run build
      - run: rm -f .github/workflows/p0-3-residual-controller.yml scripts/apply_p0_3_residual_truth.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app frontend tests .github scripts
          git commit -m "Fix residual journal audit truth"
          git push origin HEAD:fix/p0-3-residual-journal-truth
