          +    signal["setup_timeframe_used"] = separated_timeframes
          +    signal["setup_candle_count"] = len(setup_candles)
          +    signal["trigger_candle_count"] = len(completed_trigger)
          +    return signal
           
           def evaluate_pure_smc_strategy(
               symbol: str,
          @@ -434,29 +444,33 @@
               candles_1m: list[dict[str, Any] | Candle],
               now: datetime | None = None,
           ) -> dict[str, Any]:
          -    completed_candles = _normalize_candles(_exclude_incomplete_candles(candles_1m))
          -    timeframe_now = _normalize_now(now, completed_candles)
          -    if len(completed_candles) < max(12, (SWING_CONFIRMATION_CANDLES * 2) + 5):
          +    completed_setup = _normalize_candles(_exclude_incomplete_candles(candles_5m))
          +    completed_trigger = _normalize_candles(_exclude_incomplete_candles(candles_1m))
          +    setup_candles = completed_setup or completed_trigger
          +    separated_timeframes = bool(completed_setup)
          +    timeframe_now = _normalize_now(now, completed_trigger or setup_candles)
          +
          +    if len(setup_candles) < max(12, (SWING_CONFIRMATION_CANDLES * 2) + 5) or not completed_trigger:
                   return _rejected_signal(symbol, "rejected", "missing_data", strategy_name=STRATEGY_PURE_SMC)
           
          -    setup = _find_pure_smc_setup(completed_candles)
          +    setup = _find_pure_smc_setup(setup_candles)
