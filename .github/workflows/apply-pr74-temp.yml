          +    completed_trigger = _normalize_candles(_exclude_incomplete_candles(candles_1m))
          +    setup_candles = completed_setup or completed_trigger
          +    separated_timeframes = bool(completed_setup)
          +
          +    minimum_setup_candles = max(EMA_BIAS_PERIOD, BREAKOUT_LEVEL_LOOKBACK)
          +    minimum_trigger_candles = max(RSI_PERIOD + 1, BREAKOUT_VOLUME_LOOKBACK + 1)
          +    if len(setup_candles) < minimum_setup_candles or len(completed_trigger) < minimum_trigger_candles:
                   return _rejected_signal(symbol, "rejected", "missing_data", strategy_name=STRATEGY_BREAKOUT)
           
          -    latest = completed_candles_1m[-1]
          -    prior_candles = completed_candles_1m[:-1]
          -    level_window = prior_candles[-BREAKOUT_LEVEL_LOOKBACK:]
          -    volume_window = prior_candles[-BREAKOUT_VOLUME_LOOKBACK:]
          +    latest = completed_trigger[-1]
          +    level_source = setup_candles if separated_timeframes else setup_candles[:-1]
          +    level_window = level_source[-BREAKOUT_LEVEL_LOOKBACK:]
          +    volume_window = completed_trigger[:-1][-BREAKOUT_VOLUME_LOOKBACK:]
               if len(level_window) < BREAKOUT_LEVEL_LOOKBACK or len(volume_window) < BREAKOUT_VOLUME_LOOKBACK:
                   return _rejected_signal(symbol, "rejected", "missing_data", strategy_name=STRATEGY_BREAKOUT)
           
          @@ -388,9 +393,10 @@
               if not long_breakout and not short_breakout:
                   return _rejected_signal(symbol, "rejected", "breakout_not_detected", strategy_name=STRATEGY_BREAKOUT)
           
          -    closes = [candle.close for candle in completed_candles_1m]
          -    ema200 = _ema(closes, EMA_BIAS_PERIOD)
          -    rsi_values = _rsi(closes, RSI_PERIOD)
          +    setup_closes = [candle.close for candle in setup_candles]
          +    trigger_closes = [candle.close for candle in completed_trigger]
          +    ema200 = _ema(setup_closes, EMA_BIAS_PERIOD)
          +    rsi_values = _rsi(trigger_closes, RSI_PERIOD)
               if ema200 is None or rsi_values is None:
                   return _rejected_signal(symbol, "rejected", "missing_data", strategy_name=STRATEGY_BREAKOUT)
           
          @@ -405,28 +411,32 @@
