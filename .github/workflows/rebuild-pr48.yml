name: Rebuild PR 48 on latest main

on:
  push:
    branches:
      - fix/p0-exact-pnl-matching-v2
    paths:
      - .github/workflows/rebuild-pr48.yml

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/p0-exact-pnl-matching-v2
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture original PR patch
        run: |
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.patch" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/48" \
            --output /tmp/pr48.patch
          test -s /tmp/pr48.patch

      - name: Reset to latest main and apply patch
        run: |
          git fetch origin main
          git reset --hard origin/main
          git apply --3way /tmp/pr48.patch
          rm -f .github/workflows/rebuild-pr48.yml

      - name: Verify intended scope
        run: |
          changed="$(git diff --name-only origin/main | sort)"
          printf '%s\n' "$changed"
          expected=$(printf '%s\n' \
            app/close_fill_sync.py \
            app/strategy_audit.py \
            tests/test_close_fill_sync.py \
            tests/test_strategy_audit.py | sort)
          test "$changed" = "$expected"

      - name: Backend compile and tests
        run: |
          python -m compileall -q app tests
          python -m unittest discover -s tests -p 'test_*.py'

      - name: Frontend checks
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Commit rebuilt branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/close_fill_sync.py app/strategy_audit.py tests/test_close_fill_sync.py tests/test_strategy_audit.py
          git commit -m "Rebuild exact exchange identity matching on latest main"
          git push --force-with-lease origin HEAD:fix/p0-exact-pnl-matching-v2
