name: Scalping timeout suppression verifier

on:
  push:
    branches:
      - fix/scalping-timeout-suppression
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify-and-commit:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/scalping-timeout-suppression
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply deterministic patch
        run: python tools/apply_scalping_timeout_suppression.py

      - name: Compile backend
        run: python -m compileall -q app tests

      - name: Run focused lifecycle tests
        run: python -m unittest tests.test_scalping_timeout_suppression -v

      - name: Run full backend suite
        id: full_backend
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p 'test_*.py' > full-backend.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 160 full-backend.log > failure-summary.log
            cat failure-summary.log
          else
            tail -n 20 full-backend.log
          fi
          exit $status

      - name: Upload backend failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scalping-timeout-failure-summary
          path: |
            full-backend.log
            failure-summary.log

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend TypeScript check
        working-directory: frontend
        run: npm run lint

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Commit verified product changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -f tools/apply_scalping_timeout_suppression.py .github/workflows/scalping-timeout-suppression-verify.yml
          git add app tests
          git commit -m 'Enforce 30-minute scalping timeout and 1-hour suppression'
          git push origin HEAD:fix/scalping-timeout-suppression
