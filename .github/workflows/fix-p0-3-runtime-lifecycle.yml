name: Fix P0-3 Runtime Lifecycle Parser

on:
  push:
    branches:
      - fix/p0-3-runtime-buy-sell-lifecycle
    paths:
      - scripts/fix_plain_buy_sell_lifecycle.py
      - .github/workflows/fix-p0-3-runtime-lifecycle.yml

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/p0-3-runtime-buy-sell-lifecycle
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - run: python scripts/fix_plain_buy_sell_lifecycle.py
      - run: python -m compileall -q app tests
      - run: python -m unittest tests.test_exchange_journal_backfill tests.test_lifecycle_persistence -v
      - run: python -m unittest discover -s tests -p "test_*.py" -v
      - working-directory: frontend
        run: npm ci && npm run lint && npm run build
      - run: rm -f .github/workflows/fix-p0-3-runtime-lifecycle.yml scripts/fix_plain_buy_sell_lifecycle.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app tests .github scripts
          git commit -m "Fix plain Buy Sell lifecycle reconstruction"
          git push origin HEAD:fix/p0-3-runtime-buy-sell-lifecycle
