name: Apply Trade Churn Fix

on:
  push:
    branches:
      - fix/trade-churn-guards

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/trade-churn-guards
          fetch-depth: 0

      - name: Normalize backward-compatible defaults
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/apply_trade_churn_fix.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              "    '    daily_limit = int(max_daily_trades or 0)\\n'\n    '    cooldown_minutes = int(reentry_cooldown_minutes or 0)\\n'",
              "    '    daily_limit = int(max_daily_trades if max_daily_trades is not None else 8)\\n'\n    '    cooldown_minutes = int(reentry_cooldown_minutes if reentry_cooldown_minutes is not None else 30)\\n'",
          )
          text = text.replace(
              "    '            max_daily_trades=int(validation[\"max_daily_trades\"]),\\n'\n    '            reentry_cooldown_minutes=int(validation[\"reentry_cooldown_minutes\"]),\\n'",
              "    '            max_daily_trades=int(validation.get(\"max_daily_trades\") or 8),\\n'\n    '            reentry_cooldown_minutes=int(validation.get(\"reentry_cooldown_minutes\") or 30),\\n'",
          )
          path.write_text(text, encoding='utf-8')
          PY

      - name: Apply deterministic source transform
        run: python tools/apply_trade_churn_fix.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall -q app tests

      - name: Focused churn guard tests
        run: python -m unittest tests.test_trade_churn_guards tests.test_execution_reservation -v

      - name: Full backend tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p 'test_*.py' -v 2>&1 | tee churn-full-tests.log

      - name: Upload regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-churn-full-tests
          path: churn-full-tests.log

      - name: Commit verified implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm tools/apply_trade_churn_fix.py
          git add app tests
          git commit -m 'Add trade churn and repeat-entry guards'
          git pull --rebase origin fix/trade-churn-guards
          git push origin HEAD:fix/trade-churn-guards
