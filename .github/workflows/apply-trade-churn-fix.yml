name: Apply Trade Churn Fix

on:
  push:
    branches:
      - fix/trade-churn-guards
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/trade-churn-guards
          fetch-depth: 0

      - name: Apply deterministic source transform
        run: python tools/apply_trade_churn_fix.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall -q app tests

      - name: Focused churn guard tests
        run: python -m unittest tests.test_trade_churn_guards tests.test_execution_reservation -v

      - name: Full backend tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Commit verified implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm tools/apply_trade_churn_fix.py
          git add app tests
          git commit -m 'Add trade churn and repeat-entry guards'
          git push origin HEAD:fix/trade-churn-guards
