name: Apply Scanner Data Contract Fix

on:
  push:
    branches:
      - fix/scanner-data-contract-regression
    paths:
      - scripts/apply_scanner_data_contract_fix.py

permissions:
  contents: write

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/scanner-data-contract-regression
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply scanner repair
        run: python scripts/apply_scanner_data_contract_fix.py

      - name: Compile backend
        run: python -m compileall -q app tests

      - name: Run focused scanner contract tests
        run: python -m unittest tests.test_scanner_data_contract -v

      - name: Run full backend suite
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Verify frontend
        working-directory: frontend
        run: npm ci && npm run lint && npm run build

      - name: Remove temporary repair files
        run: rm -f .github/workflows/apply-scanner-data-contract-fix.yml scripts/apply_scanner_data_contract_fix.py

      - name: Commit verified product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app frontend tests .github scripts
          git commit -m "P0: restore scanner strategy data contract"
          git push origin HEAD:fix/scanner-data-contract-regression
