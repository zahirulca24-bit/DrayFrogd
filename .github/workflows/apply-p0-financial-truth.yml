name: Apply P0 Financial Truth Reconciliation

on:
  push:
    branches:
      - fix/p0-financial-truth-reconciliation
    paths:
      - .github/workflows/apply-p0-financial-truth.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-p0-financial-truth.yml
      - scripts/apply_p0_financial_truth.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/p0-financial-truth-reconciliation
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply reconciliation patch
        run: python scripts/apply_p0_financial_truth.py

      - name: Run focused backend tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m unittest tests.test_financial_truth_metrics -v
          python -m compileall -q app tests

      - name: Verify frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Remove temporary patch machinery
        run: |
          rm -f scripts/apply_p0_financial_truth.py
          rm -f .github/workflows/apply-p0-financial-truth.yml

      - name: Commit repaired implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P0: reconcile Journal Performance and Dashboard financial truth"
          git push origin HEAD:fix/p0-financial-truth-reconciliation
