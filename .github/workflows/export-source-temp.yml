name: Export Source Temp

on:
  pull_request:
    branches:
      - main

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          include-hidden-files: true
          path: |
            app
            tests
            frontend
            requirements.txt
            README.md
            .github/workflows/ci.yml
