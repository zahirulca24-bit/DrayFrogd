name: Apply P0-3 Exchange Journal Lifecycle

on:
  push:
    branches:
      - fix/p0-exchange-journal-lifecycle
    paths:
      - scripts/apply_p0_3_integrations.py
      - .github/workflows/apply-p0-3-lifecycle.yml

permissions:
  contents: write

jobs:
  apply-verify-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/p0-exchange-journal-lifecycle
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply integrations
        run: python scripts/apply_p0_3_integrations.py

      - name: Compile backend
        run: python -m compileall -q app tests

      - name: Run focused lifecycle tests
        run: python -m unittest tests.test_exchange_journal_backfill tests.test_lifecycle_persistence -v

      - name: Run full backend tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Verify frontend
        working-directory: frontend
        run: npm ci && npm run lint && npm run build

      - name: Remove temporary workflow and patcher
        run: rm -f .github/workflows/apply-p0-3-lifecycle.yml scripts/apply_p0_3_integrations.py

      - name: Commit verified product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app tests .github scripts
          git commit -m "P0: persist exchange-to-journal lifecycle across restarts"
          git push origin HEAD:fix/p0-exchange-journal-lifecycle
