name: P0-5 Risk Controller

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch-product-branch:
    if: github.head_ref == 'fix/p0-authoritative-risk-engine'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product branch
        uses: actions/checkout@v4
        with:
          ref: fix/p0-authoritative-risk-engine
          fetch-depth: 0

      - name: Check whether patch remains
        id: guard
        shell: bash
        run: |
          if [ -f scripts/apply_p0_5_risk_engine.py ]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.apply == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        if: steps.guard.outputs.apply == 'true'
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply integrations
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          python scripts/apply_p0_5_risk_engine.py
          if [ -f scripts/apply_p0_5_compat.py ]; then
            python scripts/apply_p0_5_compat.py
          fi

      - name: Compile backend
        if: steps.guard.outputs.apply == 'true'
        run: python -m compileall -q app tests

      - name: Run focused tests
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          set -o pipefail
          python -m unittest tests.test_authoritative_risk_engine tests.test_p0_5_runtime_truth -v 2>&1 | tee focused-test.log

      - name: Upload focused diagnostics
        if: always() && steps.guard.outputs.apply == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: p0-5-focused-test-log
          path: focused-test.log

      - name: Run full backend tests
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee full-backend-test.log

      - name: Upload full backend diagnostics
        if: always() && steps.guard.outputs.apply == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: p0-5-full-backend-test-log
          path: full-backend-test.log

      - name: Verify frontend
        if: steps.guard.outputs.apply == 'true'
        working-directory: frontend
        run: npm ci && npm run lint && npm run build

      - name: Remove branch-local controller files
        if: steps.guard.outputs.apply == 'true'
        run: rm -f .github/workflows/apply-p0-5-risk-engine.yml scripts/apply_p0_5_risk_engine.py scripts/apply_p0_5_compat.py

      - name: Commit verified product changes
        if: steps.guard.outputs.apply == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app frontend tests .github scripts
          git commit -m "P0: enforce authoritative risk approval before execution"
          git push origin HEAD:fix/p0-authoritative-risk-engine
