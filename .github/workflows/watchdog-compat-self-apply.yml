name: Watchdog Compatibility Self Apply

on:
  push:
    branches:
      - fix/watchdog-status-backward-compatibility

permissions:
  contents: write

jobs:
  apply-test-clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: fix/watchdog-status-backward-compatibility
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Apply compatibility patch
        run: python scripts/apply_watchdog_compat_hotfix.py

      - name: Compile backend
        run: python -m compileall app

      - name: Run focused compatibility tests
        run: pytest -q tests/test_watchdog_status_compatibility.py

      - name: Run full backend tests
        run: pytest -q

      - name: Verify frontend
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Remove temporary controller files
        run: |
          rm -f scripts/apply_watchdog_compat_hotfix.py
          rm -f .github/workflows/watchdog-compat-self-apply.yml

      - name: Commit verified hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserve watchdog status API compatibility"
          git push origin HEAD:fix/watchdog-status-backward-compatibility
