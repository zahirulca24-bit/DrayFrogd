name: Control Page Watchdog Controller

on:
  pull_request:
    branches:
      - ops/control-page-watchdog-controller

permissions:
  contents: write

jobs:
  patch-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product branch
        uses: actions/checkout@v4
        with:
          ref: fix/control-page-watchdog-contract
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Apply compatibility patch
        run: python _ci_apply_watchdog_compat.py

      - name: Compile backend
        run: python -m compileall app

      - name: Run compatibility tests
        run: pytest -q tests/test_watchdog_api_compat.py

      - name: Run existing watchdog tests
        run: pytest -q tests/test_runtime_watchdog.py

      - name: Run full backend tests
        run: pytest -q

      - name: Verify frontend
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Remove temporary patcher
        run: rm _ci_apply_watchdog_compat.py

      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/main.py tests/test_watchdog_api_compat.py _ci_apply_watchdog_compat.py
          git commit -m "fix: preserve control page watchdog contract"
          git push origin HEAD:fix/control-page-watchdog-contract
