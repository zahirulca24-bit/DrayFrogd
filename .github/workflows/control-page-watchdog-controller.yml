name: Control Page Watchdog Controller

on:
  pull_request:
    branches:
      - ops/control-page-watchdog-controller

permissions:
  contents: write

jobs:
  patch-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product branch
        uses: actions/checkout@v4
        with:
          ref: fix/control-page-watchdog-contract
          fetch-depth: 0

      - name: Apply compatibility patch
        run: python _ci_apply_watchdog_compat.py

      - name: Preflight source contract
        run: |
          python - <<'PY'
          from pathlib import Path
          main_source = Path('app/main.py').read_text(encoding='utf-8')
          api_source = Path('frontend/src/api.ts').read_text(encoding='utf-8')
          checks = {
              'status_route': '@app.get("/watchdog/status")' in main_source,
              'operational_return': 'return get_watchdog_snapshot(worker_running=worker_running)' in main_source,
              'runtime_route': '@app.get("/watchdog/runtime-status")' in main_source,
              'runtime_return': 'return get_watchdog_runtime_status()' in main_source,
              'operations_route': '@app.get("/watchdog/operations")' in main_source,
              'frontend_status_path': 'getWatchdogStatus: (token: string) => request<WatchdogSnapshot>("/watchdog/status"' in api_source,
          }
          print(checks)
          assert all(checks.values()), checks
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall -q app tests

      - name: Run compatibility tests
        run: python -m unittest tests.test_watchdog_api_compat -v

      - name: Run existing watchdog tests
        run: python -m unittest tests.test_runtime_watchdog -v

      - name: Run full backend tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Verify frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Remove temporary patcher
        run: rm _ci_apply_watchdog_compat.py

      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/main.py tests/test_watchdog_api_compat.py _ci_apply_watchdog_compat.py
          git commit -m "fix: preserve control page watchdog contract"
          git push origin HEAD:fix/control-page-watchdog-contract
