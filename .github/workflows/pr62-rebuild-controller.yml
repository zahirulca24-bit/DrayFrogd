name: PR 62 clean rebuild controller

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'fix/fee-inclusive-risk-sizing'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/fee-inclusive-risk-sizing
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reset onto latest main and apply deterministic integration
        run: |
          git show HEAD:app/trading_costs.py > /tmp/trading_costs.py
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/trading_costs.py app/trading_costs.py
          python scripts/pr62_rebuild.py
          rm -f .github/workflows/pr62-rebuild-controller.yml
          rm -f scripts/pr62_rebuild.py

      - name: Verify bounded scope
        run: |
          changed="$(git diff --name-only origin/main | sort)"
          printf '%s\n' "$changed"
          expected=$(printf '%s\n' \
            .env.example \
            .github/workflows/pr62-rebuild-controller.yml \
            app/config.py \
            app/execution_service.py \
            app/position_sizing.py \
            app/trading_costs.py \
            scripts/pr62_rebuild.py \
            tests/test_fee_risk_net_rr.py | sort)
          test "$changed" = "$expected"

      - name: Backend compile and focused tests
        run: |
          python -m compileall -q app tests
          python -m unittest tests.test_fee_risk_net_rr tests.test_position_sizing tests.test_execution_service tests.test_risk_authority

      - name: Full backend regression
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Frontend checks
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Commit clean PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rebuild fee-inclusive net-RR execution safety on latest main"
          git push --force origin HEAD:fix/fee-inclusive-risk-sizing

      - name: Remove temporary controller files from main
        if: success()
        run: |
          git fetch origin main
          git checkout -B main origin/main
          rm -f .github/workflows/pr62-rebuild-controller.yml
          rm -f scripts/pr62_rebuild.py
          git add -A
          git commit -m "Remove temporary PR 62 rebuild controller"
          git push origin main
