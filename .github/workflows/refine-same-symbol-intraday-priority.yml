name: Refine same-symbol Intraday priority

on:
  push:
    branches:
      - fix/scalping-15m-intraday-priority

permissions:
  contents: write

jobs:
  verify-and-commit:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/scalping-15m-intraday-priority
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply refinement
        run: python tools/refine_same_symbol_intraday_priority.py

      - name: Compile backend
        run: python -m compileall -q app tests

      - name: Run focused tests
        run: |
          python -m unittest tests.test_signal_pipeline -v
          python -m unittest tests.test_profile_selection_priority -v
          python -m unittest tests.test_scanner_integration -v

      - name: Run full backend suite
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend TypeScript check
        working-directory: frontend
        run: npm run lint

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Commit verified refinement
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -f tools/refine_same_symbol_intraday_priority.py .github/workflows/refine-same-symbol-intraday-priority.yml
          git add app tests
          git commit -m 'Scope Intraday priority to same-symbol candidates'
          git push origin HEAD:fix/scalping-15m-intraday-priority
