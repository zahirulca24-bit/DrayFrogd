name: Apply P0-5 Authoritative Risk Engine

on:
  push:
    branches:
      - fix/p0-authoritative-risk-engine
    paths:
      - scripts/apply_p0_5_risk_engine.py
      - .github/workflows/apply-p0-5-risk-engine.yml

permissions:
  contents: write

jobs:
  apply-verify-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/p0-authoritative-risk-engine
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply risk-engine integrations
        run: python scripts/apply_p0_5_risk_engine.py

      - name: Compile backend
        run: python -m compileall -q app tests

      - name: Run focused P0-5 tests
        run: python -m unittest tests.test_authoritative_risk_engine tests.test_p0_5_runtime_truth -v

      - name: Run full backend tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Verify frontend
        working-directory: frontend
        run: npm ci && npm run lint && npm run build

      - name: Remove temporary workflow and patcher
        run: rm -f .github/workflows/apply-p0-5-risk-engine.yml scripts/apply_p0_5_risk_engine.py

      - name: Commit verified product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app frontend tests .github scripts
          git commit -m "P0: enforce authoritative risk approval before execution"
          git push origin HEAD:fix/p0-authoritative-risk-engine
