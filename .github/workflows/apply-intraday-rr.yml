name: Apply Intraday RR Fix

on:
  push:
    branches:
      - fix/intraday-profile-targets
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/intraday-profile-targets
          fetch-depth: 0

      - name: Apply deterministic source transform
        run: |
          python tmp/apply_intraday_rr.py
          python tmp/fix_scanner_profile_assertion.py

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Focused signal tests
        run: python -m unittest tests.test_signal_pipeline tests.test_scanner_integration -v

      - name: Full backend tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p 'test_*.py' -v 2>&1 | tee intraday-full-tests.log

      - name: Upload regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intraday-full-tests
          path: intraday-full-tests.log

      - name: Commit verified implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -f tmp/intraday_rr.patch tmp/apply_intraday_rr.py tmp/fix_scanner_profile_assertion.py intraday-full-tests.log
          rmdir tmp 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Fix Intraday target profile contradiction'
          git push origin HEAD:fix/intraday-profile-targets
