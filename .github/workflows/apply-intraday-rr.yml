name: Apply Intraday RR Fix

on:
  push:
    branches:
      - fix/intraday-profile-targets
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/intraday-profile-targets
          fetch-depth: 0

      - name: Apply staged patch
        shell: bash
        run: |
          set -euo pipefail
          test -f tmp/intraday_rr.patch
          git apply --check tmp/intraday_rr.patch
          git apply tmp/intraday_rr.patch

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Focused signal tests
        run: python -m unittest tests.test_signal_pipeline -v

      - name: Full backend tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Remove temporary files and commit final code
        shell: bash
        run: |
          set -euo pipefail
          rm -f tmp/intraday_rr.patch .github/workflows/apply-intraday-rr.yml
          rmdir tmp 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Fix Intraday target profile contradiction'
          git push origin HEAD:fix/intraday-profile-targets
