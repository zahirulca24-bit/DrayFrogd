name: Apply P0 exact PnL matching

on:
  push:
    branches:
      - fix/p0-exact-pnl-matching-v2
    paths:
      - '.p0/**'
      - '.github/workflows/apply-p0-exact-pnl.yml'

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: ${{ !contains(github.event.head_commit.message, '[p0-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/p0-exact-pnl-matching-v2
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Apply exact identity patches
        run: |
          git apply .p0/close_1.patch
          git apply .p0/close_2.patch
          git apply .p0/close_3.patch
          git apply .p0/strategy_audit.patch
          git apply .p0/test_close.patch
          git apply .p0/test_audit.patch

      - name: Run focused tests
        run: python -m unittest tests.test_close_fill_sync tests.test_strategy_audit

      - name: Run full backend tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Commit verified fix and remove helpers
        run: |
          rm -rf .p0 .github/workflows/apply-p0-exact-pnl.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: enforce exact exchange identity PnL matching [p0-applied]'
          git push origin HEAD:fix/p0-exact-pnl-matching-v2
