name: Apply P0 authentication security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - fix/p0-auth-security

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: ${{ !contains(github.event.head_commit.message || '', '[p0-auth-applied]') && !contains(github.event.head_commit.message || '', '[p0-auth-diagnostic]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/p0-auth-security
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Apply authentication patches with diagnostics
        shell: bash
        run: |
          set +e
          : > .p0/apply-error.txt
          failed=0
          for name in auth config main schemas auth_tests frontend_app frontend_api; do
            echo "=== ${name}.patch ===" >> .p0/apply-error.txt
            git apply --check --verbose ".p0/${name}.patch" >> .p0/apply-error.txt 2>&1
            rc=$?
            if [ "$rc" -ne 0 ]; then
              failed=1
              break
            fi
            git apply ".p0/${name}.patch"
          done
          if [ "$failed" -ne 0 ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .p0/apply-error.txt
            git commit -m 'chore: capture auth patch failure [p0-auth-diagnostic]'
            git push origin HEAD:fix/p0-auth-security
            exit 1
          fi

      - name: Run focused auth tests
        run: python -m unittest tests.test_auth_security

      - name: Run full backend tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint and build
        working-directory: frontend
        run: |
          npm run lint
          npm run build

      - name: Commit verified fix and remove helpers
        run: |
          rm -rf .p0 .github/workflows/apply-p0-auth-security.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: add expiring sessions logout and login throttling [p0-auth-applied]'
          git push origin HEAD:fix/p0-auth-security
