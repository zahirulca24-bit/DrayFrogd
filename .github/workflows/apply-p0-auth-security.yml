name: Apply P0 authentication security

on:
  push:
    branches:
      - fix/p0-auth-security
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: ${{ !contains(github.event.head_commit.message || '', '[p0-auth-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/p0-auth-security
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Apply authentication patches
        run: |
          git apply .p0/auth.patch
          git apply .p0/config.patch
          git apply .p0/main.patch
          git apply .p0/schemas.patch
          git apply .p0/auth_tests.patch
          git apply .p0/frontend_app.patch
          git apply .p0/frontend_api.patch

      - name: Run focused auth tests
        run: python -m unittest tests.test_auth_security

      - name: Run full backend tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint and build
        working-directory: frontend
        run: |
          npm run lint
          npm run build

      - name: Commit verified fix and remove helpers
        run: |
          rm -rf .p0 .github/workflows/apply-p0-auth-security.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: add expiring sessions logout and login throttling [p0-auth-applied]'
          git push origin HEAD:fix/p0-auth-security
