name: Apply PR75 Backtest Parity Temp

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Align Backtest UI profile defaults
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("frontend/src/components/SettingsBacktest.tsx")
          text = path.read_text()
          replacements = [
              ('const [maxHoldCandles, setMaxHoldCandles] = useState("240");', 'const [maxHoldCandles, setMaxHoldCandles] = useState("30");'),
              ('Scalping uses 5m/1m; Intraday uses 15m/5m.', 'Scalping uses 15m trend / 5m setup / 1m trigger; Intraday uses 1h trend / 15m setup / 5m trigger.'),
              ('setMaxHoldCandles(next === "intraday" ? "72" : "240");', 'setMaxHoldCandles(next === "intraday" ? "72" : "30");'),
              ('<option value="scalping">Scalping: 5m setup / 1m trigger</option>', '<option value="scalping">Scalping: 15m / 5m / 1m</option>'),
              ('<option value="intraday">Intraday: 15m setup / 5m trigger</option>', '<option value="intraday">Intraday: 1h / 15m / 5m</option>'),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"frontend anchor missing: {old}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY

      - name: Verify backend
        run: |
          python -m compileall -q app tests
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Verify frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Commit verified UI and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/apply-pr75-temp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/components/SettingsBacktest.tsx .github/workflows/apply-pr75-temp.yml
          git diff --cached --quiet || git commit -m "fix: align backtest UI with live profiles"
          git push origin HEAD:${{ github.head_ref }}
