name: Apply PR75 Backtest Parity Temp

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply verified parity patch
        shell: bash
        run: |
          cat > /tmp/pr75_patch.b64 <<'PATCH_B64'
          
          PATCH_B64
          base64 -d /tmp/pr75_patch.b64 > /tmp/pr75_patch.tar.gz
          tar -xzf /tmp/pr75_patch.tar.gz

      - name: Verify backend
        run: |
          python -m compileall -q app tests
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Verify frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Commit verified changes and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/apply-pr75-temp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/backtest.py app/schemas.py frontend/src/components/SettingsBacktest.tsx tests/test_backtest_live_parity.py .github/workflows/apply-pr75-temp.yml
          git diff --cached --quiet || git commit -m "fix: align backtest defaults and signal gates with live pipeline"
          git push origin HEAD:${{ github.head_ref }}
