name: P0-5.1 Watchdog Controller

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch-product-branch:
    if: github.head_ref == 'fix/p0-5-1-runtime-watchdog'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product branch
        uses: actions/checkout@v4
        with:
          ref: fix/p0-5-1-runtime-watchdog
          fetch-depth: 0

      - name: Check whether patch remains
        id: guard
        shell: bash
        run: |
          if [ -f scripts/apply_p0_5_1_watchdog.py ]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.apply == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        if: steps.guard.outputs.apply == 'true'
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply integrations
        if: steps.guard.outputs.apply == 'true'
        run: python scripts/apply_p0_5_1_watchdog.py

      - name: Compile backend
        if: steps.guard.outputs.apply == 'true'
        run: python -m compileall -q app tests

      - name: Run focused tests
        if: steps.guard.outputs.apply == 'true'
        run: python -m unittest tests.test_runtime_watchdog -v

      - name: Run full backend tests
        if: steps.guard.outputs.apply == 'true'
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Verify frontend
        if: steps.guard.outputs.apply == 'true'
        working-directory: frontend
        run: npm ci && npm run lint && npm run build

      - name: Remove temporary patcher
        if: steps.guard.outputs.apply == 'true'
        run: rm -f scripts/apply_p0_5_1_watchdog.py

      - name: Commit verified product changes
        if: steps.guard.outputs.apply == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app tests scripts
          git commit -m 'P0: add authoritative runtime snapshot and watchdog'
          git push origin HEAD:fix/p0-5-1-runtime-watchdog
